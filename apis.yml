apis:
  - aid: descartes-labs:descartes-labs-platform
    name: Descartes Labs Platform (Archived)
    description: >-
      The historical Descartes Labs Platform — a managed geospatial data
      refinery and analytics environment exposing imagery catalog, raster
      access, vector tables, compute functions, and authentication through a
      Python client library, REST endpoints under *.descarteslabs.com, and a
      `descarteslabs` CLI. The Platform was discontinued and rebranded as
      EarthDaily EarthOne in 2025. APIs and endpoints below are preserved for
      historical reference; no public OpenAPI specification was ever
      published.
    tags:
      - Geospatial
      - Platform
      - Archived
    humanURL: https://github.com/dlarchives/descarteslabs-python
    properties:
      - type: Documentation
        url: https://github.com/dlarchives/descarteslabs-python
      - type: SDKs
        url: https://github.com/dlarchives/descarteslabs-python
      - type: PythonPackage
        url: https://pypi.org/project/descarteslabs/
      - type: Successor
        url: https://github.com/earthdaily/earthone-python
  - aid: descartes-labs:catalog
    name: Descartes Labs Catalog API
    description: >-
      The Catalog organised all imagery and derived data on the Platform.
      Products group Bands which group Images; Storage Blobs hold arbitrary
      file artefacts; Events emit notifications when new images, blobs, or
      scheduled triggers fire so that Compute Functions can be automatically
      invoked. Catalog supported sharing via owners / writers / readers,
      EventSubscriptions (SQS, ComputeFunctionCompleted, NewImage,
      NewStorage, NewVector), and EventSchedules for calendar-based runs.
      Backed by REST endpoints on *.descarteslabs.com and surfaced as
      `descarteslabs.catalog`.
    tags:
      - Catalog
      - Imagery
      - Products
      - Bands
      - Blobs
      - Events
    humanURL: https://github.com/dlarchives/descarteslabs-python/tree/master/descarteslabs/catalog
    properties:
      - type: SourceCode
        url: https://github.com/dlarchives/descarteslabs-python/tree/master/descarteslabs/catalog
      - type: Module
        url: https://github.com/dlarchives/descarteslabs-python/tree/master/descarteslabs/catalog
  - aid: descartes-labs:compute
    name: Descartes Labs Compute API
    description: >-
      The Compute service ran user-supplied Python code as containerised
      Functions against the imagery archive at scale. Users defined a
      `Function` (CPUs, memory, environment, Docker image), submitted Jobs
      (often via `Function.map` over hundreds of thousands of tiles), and
      collected results. Compute integrated with Catalog Events to fire on
      new imagery and emitted `compute-function-completed` events on
      drain-to-zero. Surfaced as `descarteslabs.compute` (Function, Job,
      JobStatistics, JobBulkCreateResult, ComputeClient).
    tags:
      - Compute
      - Batch
      - Functions
      - Jobs
    humanURL: https://github.com/dlarchives/descarteslabs-python/tree/master/descarteslabs/compute
    properties:
      - type: SourceCode
        url: https://github.com/dlarchives/descarteslabs-python/tree/master/descarteslabs/compute
      - type: Module
        url: https://github.com/dlarchives/descarteslabs-python/tree/master/descarteslabs/compute
  - aid: descartes-labs:vector
    name: Descartes Labs Vector API
    description: >-
      The Vector service hosted tabular and geospatial feature data as
      Tables of typed columns with `uuid` identifiers and ipyleaflet
      visualisation. Supported property filtering (including `ilike`
      wildcard matches), table options for column ordering, and
      tile-based rendering. Originally shipped as the standalone
      `descarteslabs-vector` PyPI package and absorbed into
      `descarteslabs.vector` in client 3.0.0.
    tags:
      - Vector
      - Tabular
      - Features
      - Visualization
    humanURL: https://github.com/dlarchives/descarteslabs-vector
    properties:
      - type: SourceCode
        url: https://github.com/dlarchives/descarteslabs-vector
      - type: Module
        url: https://github.com/dlarchives/descarteslabs-python/tree/master/descarteslabs/vector
  - aid: descartes-labs:dynamic-compute
    name: Descartes Labs Dynamic Compute API
    description: >-
      Dynamic Compute was the Platform's lazy map-computation engine for
      interactive raster algebra and tile rendering in notebooks.
      Expressions over imagery products (band math, mosaicking, temporal
      compositing) were built lazily and evaluated on demand against the
      compute backend, with results streamed as XYZ map tiles into an
      ipyleaflet map. Distributed as the separate `descarteslabs-dynamic-compute`
      package.
    tags:
      - Dynamic Compute
      - Raster
      - Tiles
      - Map Algebra
    humanURL: https://github.com/dlarchives/descarteslabs-dynamic-compute
    properties:
      - type: SourceCode
        url: https://github.com/dlarchives/descarteslabs-dynamic-compute
      - type: PythonPackage
        url: https://pypi.org/project/descarteslabs-dynamic-compute/
  - aid: descartes-labs:auth
    name: Descartes Labs Auth API
    description: >-
      The Auth module handled token-based authentication against
      app.descarteslabs.com — OAuth login flow, refresh tokens, and the
      user namespace claim that served as a global identifier for the
      authenticated user across Catalog, Compute, Vector, and Storage.
      Surfaced as `descarteslabs.auth` and consumed transparently by every
      other client module.
    tags:
      - Auth
      - Authentication
      - OAuth
    humanURL: https://github.com/dlarchives/descarteslabs-python/tree/master/descarteslabs/auth
    properties:
      - type: SourceCode
        url: https://github.com/dlarchives/descarteslabs-python/tree/master/descarteslabs/auth
      - type: Module
        url: https://github.com/dlarchives/descarteslabs-python/tree/master/descarteslabs/auth
