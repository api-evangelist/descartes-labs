aid: descartes-labs
name: Descartes Labs
description: >-
  Descartes Labs was a Santa Fe, New Mexico geospatial intelligence company
  founded in 2014 as a spin-out from Los Alamos National Laboratory. The
  company built the Descartes Labs Platform, a cloud-native geospatial data
  refinery and analytics environment combining a petabyte-scale satellite
  imagery archive (Landsat, Sentinel-1/2, MODIS, NAIP, PlanetScope, SkySat,
  commercial radar, NEXRAD weather radar, plus client-uploaded data) with a
  Python client library, JupyterHub-based workbench, and distributed compute
  for training and running deep learning and remote-sensing models at scale.
  Customers in agriculture, mining, energy, defense, insurance, and the U.S.
  government used the platform to build production geospatial machine learning
  pipelines covering crop forecasting, mineral exploration, infrastructure
  monitoring, methane detection, wildfire response, and ESG reporting. The
  Platform exposed a Catalog (imagery, bands, products, blobs, events), a
  Compute service (containerised functions, jobs, schedules), a Vector
  service (tabular and geospatial features), Dynamic Compute (lazy raster
  algebra and tiling), Auth, and a `descarteslabs` CLI. In October 2024,
  EarthDaily Analytics — backed by Antarctica Capital — acquired Descartes
  Labs and the Descartes Labs Government, Inc. subsidiary, folding the team,
  customers, and platform into the EarthDaily Constellation programme. The
  product was rebranded EarthOne in 2025; the `descarteslabs` Python package
  has been formally discontinued in favour of `earthdaily-earthone` (v5.x),
  the github.com/descarteslabs organisation has been renamed to `dlarchives`,
  www.descarteslabs.com is now a parked domain, and the docs.descarteslabs.com
  developer portal has been retired in favour of EarthDaily-hosted EarthOne
  documentation. This catalog entry preserves the historical Descartes Labs
  Platform surface as an archive — see the EarthDaily / EarthOne profile for
  the active product.
